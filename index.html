<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Double Elephant</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #0b0b1f;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.6;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 10px;
        background: #16213e;
        border: 2px solid #00d4ff;
        color: white;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: #00ffff;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
      }

      button {
        padding: 10px 20px;
        background: #00d4ff;
        color: #0b0b1f;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s;
        font-size: 14px;
      }

      button:hover {
        background: #00ffff;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
      }

      button:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
